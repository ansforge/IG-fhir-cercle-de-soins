name: Translate pagecontent (FR → EN) via Albert IA

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode de traduction'
        required: true
        default: 'missing'
        type: choice
        options:
          - missing
          - force

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Translate pagecontent pages (FR→EN)
        env:
          ALBERT_API_KEY: ${{ secrets.ALBERT_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.mode }}" = "force" ]; then
            FORCE_FLAG="--force"
          fi
          python tools/translate_pages.py $FORCE_FLAG

      - name: Translate .po files (FR→EN)
        env:
          ALBERT_API_KEY: ${{ secrets.ALBERT_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.mode }}" = "force" ]; then
            FORCE_FLAG="--force"
          fi
          python tools/translate_po.py $FORCE_FLAG

      - name: Create PR with translations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add input/translations/en/

          if git diff --cached --quiet; then
            echo "No translation changes — skipping PR creation."
            exit 0
          fi

          BRANCH="translations/auto-$(date +%Y%m%d-%H%M%S)"
          BASE="${{ github.ref_name }}"
          git checkout -b "$BRANCH"
          git commit -m "chore: auto-translate FR→EN via Albert IA (mode: ${{ inputs.mode }})"
          git push origin "$BRANCH"

          TRANSLATED=$(git diff HEAD~1 --name-only | sed 's|^|* |')

          gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "chore: traduction automatique FR→EN via Albert IA (mode: ${{ inputs.mode }})" \
            --body "## Description des changements

          ${TRANSLATED}

          ## Preview

          https://ansforge.github.io/IG-fhir-cercle-de-soins/${BRANCH}/ig"
